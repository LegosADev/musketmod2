plugins {
    id 'java-library'
    id 'net.neoforged.moddev' version '1.0.23'
}

version = '1.0.0'
group = 'com.example.musketmod'

base {
    archivesName = 'musketmod'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

neoForge {
    // NeoForge for Minecraft 1.21.1
    version = '21.1.77'

    runs {
        client {
            client()
        }
        server {
            server()
        }
    }

    mods {
        musketmod {
            sourceSet(sourceSets.main)
        }
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}
